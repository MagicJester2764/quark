[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = ["-C", "link-arg=-Tlinker.ld", "-C", "relocation-model=pic", "-C", "link-arg=--no-dynamic-linker", "-C", "link-arg=-static", "-C", "link-arg=-no-pie", "-C", "link-arg=--no-eh-frame-hdr"]

[unstable]
build-std = ["core"]
build-std-features = ["compiler-builtins-mem"]
